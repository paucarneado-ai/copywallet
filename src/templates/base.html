<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Copywallet{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body class="h-full bg-gray-900 text-gray-100">

  <!-- Navigation -->
  <nav class="bg-gray-800 border-b border-gray-700">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex items-center justify-between h-14">
        <span class="text-lg font-bold tracking-wide text-emerald-400">Copywallet</span>

        <div class="flex space-x-1">
          {% set nav_items = [
            ("overview", "Overview"),
            ("positions", "Positions"),
            ("trades", "Trades"),
            ("pnl", "PnL"),
            ("leaders", "Leaders"),
            ("settings", "Settings"),
          ] %}
          {% for href, label in nav_items %}
          <a
            href="/{{ href }}"
            class="px-3 py-2 rounded text-sm font-medium
              {% if request.url.path == '/' ~ href %}
                bg-gray-900 text-white
              {% else %}
                text-gray-300 hover:bg-gray-700 hover:text-white
              {% endif %}"
          >{{ label }}</a>
          {% endfor %}
        </div>
      </div>
    </div>
  </nav>

  <!-- Page content -->
  <main class="max-w-7xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
