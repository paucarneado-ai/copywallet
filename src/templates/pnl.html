{% extends "base.html" %}
{% block title %}PnL - Copywallet{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">Profit &amp; Loss</h1>

{% if snapshots %}
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
  <!-- Portfolio value chart -->
  <div class="bg-gray-800 rounded-lg border border-gray-700 p-4">
    <h2 class="text-lg font-semibold mb-3">Portfolio Value</h2>
    <canvas id="portfolioChart"></canvas>
  </div>

  <!-- Daily PnL chart -->
  <div class="bg-gray-800 rounded-lg border border-gray-700 p-4">
    <h2 class="text-lg font-semibold mb-3">Daily PnL</h2>
    <canvas id="pnlChart"></canvas>
  </div>
</div>
{% else %}
<div class="bg-gray-800 rounded-lg border border-gray-700 p-8 text-center">
  <p class="text-gray-500">No portfolio snapshots yet. Data will appear after the first trading cycle.</p>
</div>
{% endif %}

<script src="/static/chart_config.js"></script>
{% endblock %}
